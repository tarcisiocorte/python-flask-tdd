services:
  api:
    build: .
    container_name: flask-tdd-api
    environment:
      PORT: ${PORT:-5000}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      BCRYPT_SALT: ${BCRYPT_SALT:-12}
      MONGO_URL: mongodb://${MONGO_APP_USER:-flask_app}:${MONGO_APP_PASSWORD:?Set MONGO_APP_PASSWORD in .env}@mongodb:27017/${MONGO_DB_NAME:-flask_db}?authSource=${MONGO_DB_NAME:-flask_db}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-flask_db}
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: flask-tdd-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flask_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-flask_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flask_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7-jammy
    container_name: flask-tdd-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-mongo_root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD in .env}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-flask_db}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-flask_db}
      MONGO_APP_USER: ${MONGO_APP_USER:-flask_app}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:?Set MONGO_APP_PASSWORD in .env}
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init-app-user.js:/docker-entrypoint-initdb.d/init-app-user.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local

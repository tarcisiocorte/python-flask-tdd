services:
  api:
    build: .
    container_name: flask-tdd-api
    environment:
      PORT: ${PORT:-5000}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      BCRYPT_SALT: ${BCRYPT_SALT:-12}
      MONGO_URL: mongodb://${MONGO_USER:-flask_user}:${MONGO_PASSWORD:?Set MONGO_PASSWORD in .env}@mongodb:27017/?authSource=admin
      MONGO_DB_NAME: ${MONGO_DB_NAME:-flask_db}
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: flask-tdd-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flask_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-flask_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flask_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7-jammy
    container_name: flask-tdd-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-flask_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?Set MONGO_PASSWORD in .env}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-flask_db}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
